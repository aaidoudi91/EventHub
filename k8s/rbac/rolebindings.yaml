apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: django-rolebinding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: django-sa
    namespace: default
roleRef:
  kind: Role
  name: django-role
  apiGroup: rbac.authorization.k8s.io
