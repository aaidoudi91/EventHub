services:

  postgres:
    image: postgres:16-alpine
    container_name: eventhub-postgres
    environment:
      POSTGRES_DB: eventhub
      POSTGRES_USER: eventhub_user
      POSTGRES_PASSWORD: eventhub_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventhub_user -d eventhub"]
      interval: 5s
      timeout: 5s
      retries: 5

  django:
    build: ./backend-django
    container_name: eventhub-django
    environment:
      DEBUG: "False"
      SECRET_KEY: "local-dev-secret-key-change-in-prod"
      DATABASE_URL: "postgresql://eventhub_user:eventhub_password@postgres:5432/eventhub"
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py seed &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2"

  node:
    build: ./backend-node
    container_name: eventhub-node
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: eventhub
      DB_USER: eventhub_user
      DB_PASSWORD: eventhub_password
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: